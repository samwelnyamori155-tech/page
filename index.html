<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eco Cash Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.phone{

width:100%;
max-width:420px;
background:white;
min-height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

.top{
padding:40px 25px;
text-align:center;
}

.logo{

font-size:52px;
font-weight:bold;
margin-bottom:45px;

}

.logo span:first-child{
color:#1769ff;
}

.logo span:last-child{
color:#00b894;
}

h2{

color:#444;
margin-bottom:30px;
font-size:36px;

}

.phone-input{

display:flex;
align-items:center;
gap:10px;

border:2px solid #1769ff;
border-radius:15px;

padding:15px;

}

.flag{

font-size:24px;

}

.phone-input select{

border:none;
font-size:20px;
outline:none;
background:none;

}

.phone-input input{

border:none;
outline:none;
font-size:20px;
flex:1;

}

.pin-title{

margin-top:35px;
font-size:24px;
color:#666;

}

.pin-area{

display:flex;
justify-content:center;
gap:15px;
margin-top:30px;

}

.pin{

width:60px;
height:70px;

font-size:30px;
text-align:center;

border:2px solid #1769ff;
border-radius:12px;

outline:none;

}

.bottom{

margin-top:auto;
background:#1769ff;
color:white;

padding:55px 25px 35px;

text-align:center;

border-top-left-radius:50% 90px;
border-top-right-radius:50% 90px;

}

.bottom p{

font-size:20px;
line-height:30px;

}

.actions{

display:flex;
gap:15px;
margin-top:35px;

}

.actions button{

flex:1;
border:none;
background:white;
border-radius:14px;
padding:18px;

font-size:18px;
cursor:pointer;
transition:.25s;

}

.actions button:hover{

transform:translateY(-3px);

}

.version{

margin-top:40px;
font-size:18px;

}

.terms{

margin-top:18px;
font-size:15px;

}

.terms a{

color:white;

}

@media(max-width:420px){

.logo{
font-size:44px;
}

h2{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="phone">

<div class="top">

<div class="logo">
<span>Nova</span><span>Pay</span>
</div>

<h2>Login</h2>

<div class="phone-input">

<div class="flag">🇿🇼</div>

<select>
<option>+263</option>
<option>+255</option>
<option>+256</option>
</select>

<input
type="tel"
placeholder="Phone Number">

</div>

<div class="pin-title">
Enter your 4-digit PIN
</div>

<div class="pin-area">

<input class="pin" maxlength="1" type="password">

<input class="pin" maxlength="1" type="password">

<input class="pin" maxlength="1" type="password">

<input class="pin" maxlength="1" type="password">

</div>

</div>

<div class="bottom">

<p>
Need an account or assistance?<br>
Choose an option below.
</p>

<div class="actions">

<button>
👤<br><br>
Register
</button>

<button>
❓<br><br>
Support
</button>

</div>

<div class="version">
v1.0.0
</div>

<div class="terms">
By signing in you agree to the
<a href="#">Terms & Conditions</a>
</div>

</div>

</div>

<script>

const inputs=document.querySelectorAll(".pin");

inputs.forEach((box,index)=>{

box.addEventListener("input",()=>{

box.value=box.value.replace(/[^0-9]/g,'');

if(box.value.length===1 && index<inputs.length-1){

inputs[index+1].focus();

}

});

box.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && box.value===""){

if(index>0){

inputs[index-1].focus();

}

}

});

});

</script>

</body>
</html>
